name: Release Desktop

on:
  push:
    tags:
      - "v*"
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install sqlite3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install sqlite3 (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Install sqlite3 (Windows)
        if: runner.os == 'Windows'
        run: choco install sqlite -y

      - name: Build and publish
        run: pnpm desktop:build -- --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Set desktop release tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == desktop-v* ]]; then
            echo "DESKTOP_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "DESKTOP_TAG=desktop-${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Ensure desktop release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$DESKTOP_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            title="Desktop app ${DESKTOP_TAG#desktop-}"
            gh release create "$DESKTOP_TAG" --repo "$GITHUB_REPOSITORY" -t "$title" -n ""
          fi

      - name: Upload artifacts to desktop release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(dist-desktop/*.dmg dist-desktop/*.zip dist-desktop/*.exe dist-desktop/*.AppImage)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No desktop artifacts found in dist-desktop"
            exit 1
          fi
          gh release upload "$DESKTOP_TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
